<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5f4bd8">
<title>AI Chat Translator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#5f4bd8,#6b57e2);
  display:flex;
  justify-content:center;
  align-items:stretch;
}

/* APP */

.chat-container{
  width:100%;
  /* FIX #1: height managed by JS via visualViewport — don't use 100dvh directly */
  height:100dvh;
  background:white;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* DESKTOP CARD */

@media(min-width:768px){
  body{align-items:center}
  .chat-container{
    max-width:520px;
    height:92vh;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
}

/* HEADER */

.chat-header{
  background:#5f4bd8;
  color:white;
  padding:calc(18px + env(safe-area-inset-top)) 18px 18px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}

.chat-header h3{
  margin:0;
  font-size:16px;
  font-weight:500;
  display:flex;
  align-items:center;
  gap:8px;
}

/* FIX #9: Language indicator badge */

#langBadge{
  font-size:12px;
  font-weight:600;
  background:rgba(255,255,255,0.2);
  padding:3px 8px;
  border-radius:20px;
  letter-spacing:0.3px;
  white-space:nowrap;
}


.plus-btn{
  width:48px;
  height:48px;
  border-radius:50%;
  background:white;
  color:#5f4bd8;
  font-size:24px;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  /* FIX #6: tap feedback */
  transition:transform 0.1s, opacity 0.1s;
  -webkit-tap-highlight-color:transparent;
}

.plus-btn:active{
  transform:scale(0.88);
  opacity:0.85;
}

/* CHAT BODY */

.chat-box{
  flex:1;
  padding:18px;
  overflow-y:auto;
  background:#f5f6fa;
  display:flex;
  flex-direction:column;
  min-height:0; /* prevent flex overflow */
}

.chat-messages{
  display:flex;
  flex-direction:column;
}

/* anchor bottom trick */

.chat-messages::after{
  content:"";
  margin-top:auto;
}

/* MESSAGE */

.message{
  max-width:80%;
  padding:12px 14px;
  margin-bottom:12px;
  border-radius:18px;
  font-size:14px;
  line-height:1.45;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
  word-wrap:break-word;
  animation:msgIn 0.18s ease-out;
}

@keyframes msgIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.host{
  align-self:flex-end;
  background:white;
  border-bottom-right-radius:6px;
}

.guest{
  align-self:flex-start;
  background:#e9e7ff;
  border-bottom-left-radius:6px;
}

.system{
  align-self:center;
  background:#ddd;
  font-size:12px;
  max-width:90%;
  text-align:center;
}

/* TEXT STYLE */

.original-text{
  font-weight:400;
  opacity:0.65;
}

.translated-text{
  margin-top:6px;
  font-size:13px;
  font-weight:500;
}

.divider{
  height:1px;
  margin:6px 0;
  background:rgba(0,0,0,0.08);
}

/* FIX #11: Timestamp */

.msg-time{
  font-size:10px;
  opacity:0.4;
  margin-top:4px;
  display:block;
}

/* FIX #3: Translating skeleton bubble */

.pending-bubble{
  background:white;
  border-radius:18px;
  padding:14px 18px;
  margin-bottom:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
  display:flex;
  align-items:center;
  gap:5px;
}

.pending-bubble.host{
  align-self:flex-end;
  background:white;
  border-bottom-right-radius:6px;
}

.pending-bubble.guest{
  align-self:flex-start;
  background:#e9e7ff;
  border-bottom-left-radius:6px;
}

.pending-bubble span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#5f4bd8;
  opacity:0.4;
  animation:bounce 1.1s infinite ease-in-out;
}

.pending-bubble span:nth-child(2){animation-delay:0.18s}
.pending-bubble span:nth-child(3){animation-delay:0.36s}

@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:0.4}
  40%{transform:translateY(-5px);opacity:1}
}

/* INPUT */

.chat-input{
  display:flex;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom)) 14px;
  background:white;
  border-top:1px solid #eee;
  gap:10px;
  align-items:flex-end;
  flex-shrink:0;
}

.chat-input textarea{
  flex:1;
  resize:none;
  border:none;
  padding:12px 14px;
  border-radius:24px;
  background:#f1f1f1;
  outline:none;
  font-size:16px; /* 16px prevents iOS zoom-in on focus */
  font-family:inherit;
  line-height:1.4;
  max-height:120px;
  overflow-y:auto;
}

.chat-input textarea::placeholder{color:#999}

/* FIX #2: Send button 48px tap target + FIX #6: tap feedback */

.chat-input button{
  background:#5f4bd8;
  color:white;
  border:none;
  width:48px;
  height:48px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 0.1s, background 0.1s;
  -webkit-tap-highlight-color:transparent;
}

.chat-input button:active{
  transform:scale(0.88);
  background:#4a39c4;
}

/* FIX #4: Reconnecting banner */

#reconnectBanner{
  display:none;
  background:#f59e0b;
  color:white;
  font-size:12px;
  font-weight:600;
  text-align:center;
  padding:6px;
  flex-shrink:0;
  letter-spacing:0.3px;
}

/* SCROLL BUTTON */

.scroll-btn{
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  width:44px;
  height:44px;
  border-radius:50%;
  background:#5f4bd8;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  -webkit-tap-highlight-color:transparent;
}

.scroll-badge{
  position:absolute;
  top:-4px;
  right:-4px;
  background:red;
  color:white;
  font-size:10px;
  width:16px;
  height:16px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* INVITE LINK — FIX #5: tappable + copy button */

.invite-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
  background:#f1f1f1;
  border-radius:10px;
  padding:8px 10px;
}

.invite-link{
  font-size:11px;
  word-break:break-all;
  opacity:0.8;
  flex:1;
  color:#5f4bd8;
  text-decoration:none;
}

.copy-btn{
  white-space:nowrap;
  font-size:11px;
  font-weight:600;
  color:white;
  background:#5f4bd8;
  border:none;
  border-radius:6px;
  padding:5px 9px;
  cursor:pointer;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}

.copy-btn:active{background:#4a39c4}

/* QR */

.qr-box{
  margin-top:10px;
  align-self:center;
}

/* FIX #12: Empty state */

#emptyState{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  opacity:0.45;
  padding:40px 20px;
  text-align:center;
  gap:10px;
  pointer-events:none;
}

#emptyState .es-icon{font-size:40px}
#emptyState .es-text{font-size:14px;color:#555;line-height:1.5}

/* SESSION ENDED OVERLAY */

#endedOverlay{
  display:none;
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:32px;
  text-align:center;
  animation:fadeIn 0.25s ease-out;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.97)}
  to{opacity:1;transform:scale(1)}
}

#endedOverlay .ended-icon{font-size:48px;line-height:1}

#endedOverlay h2{
  margin:0;
  font-size:20px;
  font-weight:700;
  color:#1a1a2e;
}

#endedOverlay p{
  margin:0;
  font-size:14px;
  color:#666;
  line-height:1.5;
}

.ended-btn{
  margin-top:6px;
  padding:13px 28px;
  border-radius:24px;
  border:none;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  width:100%;
  max-width:240px;
  transition:transform 0.1s,opacity 0.1s;
  -webkit-tap-highlight-color:transparent;
}

.ended-btn:active{transform:scale(0.95);opacity:0.85}
.ended-btn-primary{background:#5f4bd8;color:white}
.ended-btn-secondary{background:#f1f1f1;color:#444}

</style>
</head>

<body>

<div class="chat-container">

  <!-- SESSION ENDED OVERLAY -->
  <div id="endedOverlay"></div>

  <div class="chat-header">
    <h3 id="headerTitle">
      AI Translator
      <span id="langBadge" style="display:none"></span>
    </h3>
    <button id="plusBtn" class="plus-btn" onclick="startSession()">+</button>
  </div>

  <!-- FIX #4: Reconnecting banner -->
  <div id="reconnectBanner">⟳ Reconnecting…</div>

  <div class="chat-box" id="chatBox">
    <!-- FIX #12: Empty state -->
    <div id="emptyState">
      <div class="es-icon">💬</div>
      <div class="es-text" id="emptyText">Start a session to begin translating</div>
    </div>
    <div id="messages" class="chat-messages"></div>
  </div>

  <div id="scrollBtn" class="scroll-btn">
    ↓
    <div id="scrollBadge" class="scroll-badge">1</div>
  </div>

  <div class="chat-input">
    <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>

let sessionId = "SESSION_ID"
let role      = "ROLE"
let ws        = null
let sessionEnded = false
let reconnectAttempts = 0
let reconnectTimer = null

// FIX #9: track language pair
let hostLang  = "Thai"
let guestLang = "Spanish"

const messagesEl  = document.getElementById("messages")
const scrollBtn   = document.getElementById("scrollBtn")
const badge       = document.getElementById("scrollBadge")
const input       = document.getElementById("messageInput")
const container   = document.getElementById("chatBox")
const emptyState  = document.getElementById("emptyState")
const reconnBanner= document.getElementById("reconnectBanner")

let unread = 0
let pendingBubble = null

// ─────────────────────────────────────────
// FIX #1: Keyboard / visualViewport resize
// ─────────────────────────────────────────

function handleViewport() {
  if (!window.visualViewport) return
  const vv = window.visualViewport
  // On mobile, when keyboard appears the viewport shrinks.
  // We pin the container to the visual viewport height.
  document.querySelector(".chat-container").style.height = vv.height + "px"
  // Also scroll so input stays visible
  scrollToBottom(false)
}

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize",  handleViewport)
  window.visualViewport.addEventListener("scroll",  handleViewport)
  handleViewport()
}

// ─────────────────────────────────────────
// SCROLL HELPERS
// ─────────────────────────────────────────

function isNearBottom() {
  const d = container.scrollHeight - container.scrollTop - container.clientHeight
  return d < 80
}

function scrollToBottom(smooth = false) {
  container.scrollTo({ top: container.scrollHeight, behavior: smooth ? "smooth" : "auto" })
  unread = 0
  scrollBtn.style.display = "none"
}

scrollBtn.onclick = () => scrollToBottom(true)

// ─────────────────────────────────────────
// INPUT AUTO SIZE
// ─────────────────────────────────────────

input.addEventListener("input", () => {
  input.style.height = "auto"
  input.style.height = input.scrollHeight + "px"
})

// ─────────────────────────────────────────
// EMPTY STATE HELPERS
// ─────────────────────────────────────────

function hideEmptyState() {
  emptyState.style.display = "none"
}

// ─────────────────────────────────────────
// FIX #9: Language badge helper
// ─────────────────────────────────────────

function updateLangBadge() {
  const badge = document.getElementById("langBadge")
  if (role === "host") {
    badge.textContent = hostLang + " ↔ " + guestLang
    badge.style.display = "inline"
  } else if (role === "guest") {
    badge.textContent = guestLang + " ↔ " + hostLang
    badge.style.display = "inline"
  }
}

// ─────────────────────────────────────────
// SESSION ENDED OVERLAY
// ─────────────────────────────────────────

function showEndedOverlay() {
  const overlay = document.getElementById("endedOverlay")

  document.getElementById("messageInput").disabled = true
  document.getElementById("sendBtn").disabled = true

  const isHost = role === "host"

  overlay.innerHTML = `
    <div class="ended-icon">👋</div>
    <h2>This session ended.</h2>
    <p>Thank you for chatting!</p>
    ${isHost
      ? `<button class="ended-btn ended-btn-primary" onclick="resetToHome()">Start New Session</button>`
      : ``
    }
  `

  overlay.style.display = "flex"
}

function resetToHome() {
  // Wipe state
  sessionId = "SESSION_ID"
  role = "ROLE"
  ws = null
  sessionEnded = false
  reconnectAttempts = 0
  hostLang = "Thai"
  guestLang = "Spanish"

  // Clear overlay
  const overlay = document.getElementById("endedOverlay")
  overlay.style.display = "none"

  // Clear messages
  document.getElementById("messages").innerHTML = ""

  // Re-enable input
  document.getElementById("messageInput").disabled = false
  document.getElementById("sendBtn").disabled = false

  // Reset header
  document.getElementById("headerTitle").childNodes[0].textContent = "AI Translator "
  document.getElementById("langBadge").style.display = "none"

  // Show + button again, hide end button
  document.getElementById("plusBtn").style.display = "flex"

  // Show empty state
  document.getElementById("emptyState").style.display = "flex"
  document.getElementById("emptyText").textContent = "Start a session to begin translating"
}


// ─────────────────────────────────────────

function showPending(sender) {
  if (pendingBubble) return
  const bubble = document.createElement("div")
  // Match bubble side to whoever sent the message
  bubble.className = "pending-bubble " + sender
  bubble.innerHTML = "<span></span><span></span><span></span>"
  pendingBubble = bubble
  messagesEl.appendChild(bubble)
  scrollToBottom(false)
}

function hidePending() {
  if (pendingBubble) {
    pendingBubble.remove()
    pendingBubble = null
  }
}

// ─────────────────────────────────────────
// GUEST AUTO CONNECT
// ─────────────────────────────────────────

if (role === "guest") {
  document.getElementById("plusBtn").style.display = "none"
  document.getElementById("headerTitle").childNodes[0].textContent = "Guest Session "
  document.getElementById("emptyText").textContent = "Start chatting with your host…"
  updateLangBadge()
  connectWebSocket()

  // FIX #7: auto-focus with delay (avoids iOS quirks)
  setTimeout(() => { input.focus() }, 600)
}

// ─────────────────────────────────────────
// FIX #4: WEBSOCKET WITH RECONNECTION
// ─────────────────────────────────────────

function connectWebSocket() {
  if (sessionEnded) return

  const url = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/${sessionId}/${role}`
  ws = new WebSocket(url)

  ws.onopen = () => {
    reconnectAttempts = 0
    reconnBanner.style.display = "none"
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  }

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data)

    if (data.system) {
      if (data.system === "Session ended.") {
        sessionEnded = true
        hidePending()
        // Short delay so the user sees the chat before the overlay appears
        setTimeout(() => showEndedOverlay(), 400)
        return
      }

      // FIX #9: structured lang_update — works for both host and guest
      if (data.lang_update) {
        hostLang  = data.lang_update.host_lang
        guestLang = data.lang_update.guest_lang
        updateLangBadge()
      }

      hidePending()
      addSystemMessage(data.system)
      return
    }

    hidePending()

    if (data.from === role) {
      addMessage(data.original, role)
    } else {
      addMessage(data.original, data.from, data.translated)
    }
  }

  ws.onerror = () => { /* onclose will handle */ }

  ws.onclose = () => {
    if (sessionEnded) return   // ended intentionally — overlay already shown
    hidePending()

    // Show reconnect banner
    reconnBanner.style.display = "block"

    // Exponential backoff: 1s, 2s, 4s, 8s, max 15s
    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 15000)
    reconnectAttempts++

    reconnectTimer = setTimeout(() => {
      connectWebSocket()
    }, delay)
  }
}

// ─────────────────────────────────────────
// MESSAGE RENDERING
// ─────────────────────────────────────────

function timeLabel() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
}

function addMessage(originalText, sender, translatedText = null) {
  hideEmptyState()

  const wasNearBottom = isNearBottom()

  const msg = document.createElement("div")
  msg.classList.add("message", sender)

  const formattedOriginal = originalText.replace(/\n/g, "<br>")

  if (translatedText) {
    const formattedTranslated = translatedText.replace(/\n/g, "<br>")
    msg.innerHTML = `
      <div class="original-text">${formattedOriginal}</div>
      <div class="divider"></div>
      <div class="translated-text">${formattedTranslated}</div>
      <span class="msg-time">${timeLabel()}</span>
    `
  } else {
    msg.innerHTML = `
      <div class="original-text">${formattedOriginal}</div>
      <span class="msg-time">${timeLabel()}</span>
    `
  }

  messagesEl.appendChild(msg)

  if (wasNearBottom) {
    scrollToBottom(false)
  } else {
    unread++
    badge.innerText = unread
    scrollBtn.style.display = "flex"
  }
}

function addSystemMessage(text) {
  hideEmptyState()
  const msg = document.createElement("div")
  msg.classList.add("message", "system")
  msg.innerText = text
  messagesEl.appendChild(msg)
  scrollToBottom(false)
}

// ─────────────────────────────────────────
// SEND
// ─────────────────────────────────────────

function sendMessage() {
  const text = input.value.trim()
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return

  ws.send(input.value)

  // FIX #3: show pending bubble on sender's side
  showPending(role)

  input.value = ""
  input.style.height = "auto"
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})

// ─────────────────────────────────────────
// HOST START
// ─────────────────────────────────────────

async function startSession() {
  const res  = await fetch("/create-session", { method: "POST" })
  const data = await res.json()

  sessionId = data.session_id
  role = "host"

  document.getElementById("plusBtn").style.display = "none"
  document.getElementById("headerTitle").childNodes[0].textContent = "Host Session "
  updateLangBadge()

  addSystemMessage("Session started.")
  addSystemMessage("Scan or share this link:")

  const link = `${window.location.origin}/session/${sessionId}/guest`

  // FIX #5: tappable link + copy button
  const inviteRow = document.createElement("div")
  inviteRow.className = "invite-row"

  const linkA = document.createElement("a")
  linkA.className = "invite-link"
  linkA.href = link
  linkA.target = "_blank"
  linkA.rel = "noopener"
  linkA.textContent = link

  const copyBtn = document.createElement("button")
  copyBtn.className = "copy-btn"
  copyBtn.textContent = "Copy"
  copyBtn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(link)
      copyBtn.textContent = "✓ Copied"
      setTimeout(() => { copyBtn.textContent = "Copy" }, 2000)
    } catch {
      // fallback
      const ta = document.createElement("textarea")
      ta.value = link
      document.body.appendChild(ta)
      ta.select()
      document.execCommand("copy")
      ta.remove()
      copyBtn.textContent = "✓ Copied"
      setTimeout(() => { copyBtn.textContent = "Copy" }, 2000)
    }
  }

  inviteRow.appendChild(linkA)
  inviteRow.appendChild(copyBtn)
  messagesEl.appendChild(inviteRow)

  const qrDiv = document.createElement("div")
  qrDiv.classList.add("qr-box")
  messagesEl.appendChild(qrDiv)

  new QRCode(qrDiv, {
    text: link,
    width: 160,
    height: 160
  })

  scrollToBottom(false)
  connectWebSocket()

  // FIX #7: focus input after session starts
  setTimeout(() => { input.focus() }, 300)
}

</script>

</body>
</html>
